<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grocery Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title"> Fresh Grocery</h1>

    <div class="grid">

        <div class="card">
            
            <h2>Fresh Apples</h2>
            <p>₹120 / kg</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            
            <h2>Organic Milk</h2>
            <p>₹60 / litre</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            
            <h2>Whole Wheat Bread</h2>
            <p>₹40</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            
            <h2>Farm Eggs</h2>
            <p>₹90 / dozen</p>
            <button>Add to Cart</button>
        </div>

    </div>

</body>
</html>
