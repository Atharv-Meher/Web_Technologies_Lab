<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Marks Calculator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #dbefff, #b3d9ff);
    }

    .container {
        width: 400px;
        margin: 50px auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        text-align: center;
    }

    h2 {
        color: #003366;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    button {
        padding: 10px 20px;
        margin-top: 10px;
        background: linear-gradient(to right, #3399ff, #66ccff);
        border: none;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
    }

    table {
        margin: 30px auto;
        border-collapse: collapse;
        width: 70%;
        background-color: #f5fbff;
        border-radius: 10px;
        overflow: hidden;
    }

    th {
        background-color: #66b3ff;
        color: white;
        padding: 12px;
    }

    td {
        padding: 10px;
        border-bottom: 1px solid #cce6ff;
        text-align: center;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Student Marks Calculator</h2>

    <input type="text" id="name" placeholder="Enter Student Name">
    <input type="number" id="mark1" placeholder="Enter Mark 1">
    <input type="number" id="mark2" placeholder="Enter Mark 2">
    <input type="number" id="mark3" placeholder="Enter Mark 3">

    <button onclick="calculate()">Add Student</button>
</div>

<table id="resultTable">
    <thead>
        <tr>
            <th>Student Name</th>
            <th>Total Marks</th>
            <th>Average Marks</th>
        </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
</table>

<script>
    const calculateAverage = (m1, m2, m3) => (m1 + m2 + m3) / 3;

    function calculate() {
        let studentName = document.getElementById("name").value;
        let mark1 = Number(document.getElementById("mark1").value);
        let mark2 = Number(document.getElementById("mark2").value);
        let mark3 = Number(document.getElementById("mark3").value);

        let total = mark1 + mark2 + mark3;
        let average = calculateAverage(mark1, mark2, mark3).toFixed(2);

        // Console Output (Template Literals)
        console.log(`Student Name: ${studentName}`);
        console.log(`Total Marks: ${total}`);
        console.log(`Average Marks: ${average}`);

        // Create new row (instead of replacing)
        const newRow = `
            <tr>
                <td>${studentName}</td>
                <td>${total}</td>
                <td>${average}</td>
            </tr>
        `;

        document.getElementById("tableBody").innerHTML += newRow;

        // Optional: clear inputs after adding
        document.getElementById("name").value = "";
        document.getElementById("mark1").value = "";
        document.getElementById("mark2").value = "";
        document.getElementById("mark3").value = "";
    }
</script>

</body>
</html>
